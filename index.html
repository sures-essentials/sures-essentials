<style>
  :root{
    --cream:#EEEAE0;
    --ink:#211E1B;
    --red:#7C2430;
    --blue:#1F3A63;
    --line: rgba(33,30,27,0.16);
    --font-script:'Compotes Basilic', 'Caveat', cursive;
    --font-body:'DM Sans', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:var(--font-body);
    padding:26px 26px 100px;
    position:relative;
  }

  /* airmail stripe border */
  .stripe-edge{
    position:fixed;
    z-index:5;
    background: repeating-linear-gradient(
      45deg,
      var(--red) 0 16px,
      var(--cream) 16px 20px,
      var(--blue) 20px 36px,
      var(--cream) 36px 40px
    );
  }
  .stripe-edge.top{ top:0; left:0; right:0; height:14px; }
  .stripe-edge.bottom{ bottom:0; left:0; right:0; height:14px; }
  .stripe-edge.left{ top:0; bottom:0; left:0; width:14px; }
  .stripe-edge.right{ top:0; bottom:0; right:0; width:14px; }

  .page{
    max-width:900px;
    margin:0 auto;
    position:relative;
  }

  header.shop-header{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:6px 18px;
    padding:20px 10px 10px;
  }
  header.shop-header h1{
    font-family:var(--font-script);
    font-weight:700;
    color:var(--red);
    font-size:clamp(40px,9vw,76px);
    margin:0;
    line-height:1;
    order:1;
  }
  .logo{
    width:clamp(80px, 16vw, 130px);
    height:auto;
    order:2;
    flex-shrink:0;
  }

  .tier-toggle{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:18px 0 6px;
  }
  .tier-toggle button{
    font-family:var(--font-body);
    font-weight:700;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    padding:9px 20px;
    border-radius:999px;
    border:2px solid var(--ink);
    background:var(--cream);
    color:var(--ink);
    cursor:pointer;
  }
  .tier-toggle button.active.retail{ background:var(--red); border-color:var(--red); color:var(--cream); }
  .tier-toggle button.active.wholesale{ background:var(--blue); border-color:var(--blue); color:var(--cream); }

  .cat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:22px;
    margin-top:24px;
  }
  .cat-card{
    background:var(--cream);
    border:2px solid var(--ink);
    border-radius:16px;
    padding:20px 18px 18px;
  }
  .cat-title{
    display:flex;
    align-items:center;
    gap:10px;
    border:2px solid var(--ink);
    border-radius:12px;
    padding:10px 14px;
    margin:0 0 16px;
  }
  .cat-title .icon{ flex-shrink:0; color:var(--blue); }
  .cat-title h2{
    font-size:15px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin:0;
  }

  .variant-chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:16px;
  }
  .variant-chips button{
    font-family:var(--font-body);
    font-size:13.5px;
    font-weight:600;
    border:1.5px solid var(--ink);
    background:transparent;
    color:var(--ink);
    border-radius:999px;
    padding:7px 14px;
    cursor:pointer;
  }
  .variant-chips button.active{
    background:var(--ink);
    color:var(--cream);
  }

  .size-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 0;
    border-bottom:1px dashed var(--line);
  }
  .size-row:last-child{ border-bottom:none; }
  .size-row .size-label{ font-weight:700; font-size:14.5px; }
  .size-row .price{
    font-weight:800;
    font-size:15px;
    color:var(--red);
  }
  .size-row.wholesale-active .price{ color:var(--blue); }
  .size-row .right{ display:flex; align-items:center; gap:12px; }

  .add-btn{
    font-family:var(--font-body);
    font-weight:700;
    font-size:12.5px;
    text-transform:uppercase;
    background:var(--ink);
    color:var(--cream);
    border:none;
    border-radius:8px;
    padding:7px 12px;
    cursor:pointer;
  }
  .stepper{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .stepper button{
    width:26px;height:26px;
    border:2px solid var(--ink);
    background:var(--cream);
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
    line-height:1;
    font-weight:700;
  }

  .note{
    text-align:center;
    font-size:13.5px;
    color:var(--ink);
    opacity:0.75;
    margin-top:30px;
  }

  /* Floating cart tab */
  .cart-fab{
    position:fixed;
    right:26px;
    bottom:26px;
    background:var(--red);
    color:var(--cream);
    border:2px solid var(--ink);
    border-radius:999px;
    padding:14px 22px;
    font-weight:800;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    z-index:40;
  }
  .cart-fab .count{
    background:var(--cream);
    color:var(--red);
    border-radius:999px;
    min-width:20px;
    height:20px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    padding:0 5px;
  }

  .overlay{
    position:fixed; inset:0;
    background:rgba(20,18,15,0.45);
    z-index:50;
    display:none;
  }
  .overlay.open{ display:block; }
  .ticket{
    position:fixed;
    top:0; right:0; bottom:0;
    width:min(400px, 92vw);
    background:var(--cream);
    z-index:51;
    transform:translateX(100%);
    transition:transform 0.25s ease;
    overflow-y:auto;
    padding:0 0 32px;
    border-left:2px solid var(--ink);
  }
  .ticket.open{ transform:translateX(0); }
  .ticket-top{
    background:var(--ink);
    color:var(--cream);
    padding:20px 22px 16px;
    position:sticky; top:0;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }
  .ticket-top h2{
    font-size:15px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin:0 0 4px;
  }
  .ticket-top .order-code{ font-size:11px; opacity:0.75; }
  .ticket-top button.close{
    background:none;border:none;color:var(--cream);
    font-size:20px; cursor:pointer; line-height:1;
  }
  .ticket-body{ padding:18px 22px; }
  .ticket-empty{
    text-align:center;
    color:var(--ink);
    opacity:0.6;
    padding:40px 10px;
    font-size:14px;
  }
  .line-item{
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:6px 10px;
    align-items:center;
    padding:10px 0;
    border-bottom:1px dashed var(--line);
    font-size:13.5px;
  }
  .line-item .name{ font-weight:700; }
  .line-item .sub{ font-weight:400; opacity:0.7; }
  .line-item .line-price{ font-weight:800; color:var(--red); text-align:right; }
  .line-item .remove{
    grid-column:1 / -1;
    justify-self:start;
    background:none;border:none;
    color:var(--red);
    font-size:11px;
    cursor:pointer;
    padding:0;
    text-decoration:underline;
  }

  .totals{
    margin-top:14px;
    padding-top:12px;
    border-top:2px solid var(--ink);
  }
  .totals .row{ display:flex; justify-content:space-between; font-size:14px; padding:3px 0; font-weight:600; }
  .totals .grand{
    font-size:22px;
    margin-top:6px;
    padding-top:8px;
    border-top:1px dashed var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:800;
  }
  .grand .amount{ color:var(--red); }

  form.checkout{ margin-top:20px; display:flex; flex-direction:column; gap:12px; }
  form.checkout label{
    font-size:11px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink);
    opacity:0.7;
    display:block;
    margin-bottom:4px;
  }
  form.checkout input[type=text],
  form.checkout input[type=tel],
  form.checkout textarea{
    width:100%;
    font-family:var(--font-body);
    font-size:14px;
    padding:9px 10px;
    border:1.5px solid var(--ink);
    border-radius:8px;
    background:#fff;
  }
  form.checkout textarea{ resize:vertical; min-height:56px; }
  .radio-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .radio-row label{
    display:flex; align-items:center; gap:6px;
    text-transform:none;
    font-weight:600;
    font-size:13px;
    color:var(--ink);
    opacity:1;
    border:1.5px solid var(--ink);
    padding:7px 12px;
    border-radius:999px;
    cursor:pointer;
  }
  .radio-row input{ accent-color:var(--red); }

  .submit-btn{
    margin-top:6px;
    background:var(--red);
    color:var(--cream);
    border:2px solid var(--ink);
    border-radius:10px;
    padding:14px;
    font-weight:800;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    cursor:pointer;
  }
  .submit-btn:disabled{ opacity:0.6; cursor:default; }

  .confirm{ text-align:center; padding:30px 10px; }
  .confirm .big-stamp{
    display:inline-block;
    border:3px solid var(--blue);
    color:var(--blue);
    font-weight:800;
    font-size:18px;
    padding:10px 18px;
    border-radius:10px;
    transform:rotate(-3deg);
    margin-bottom:14px;
    text-transform:uppercase;
  }
  .confirm p{ font-size:14px; opacity:0.8; }
  .confirm .code{ font-weight:700; font-size:13px; }

  .setup-note{
    background:#fff6de;
    border:1.5px dashed var(--red);
    color:var(--ink);
    font-size:12.5px;
    padding:10px 12px;
    border-radius:8px;
    margin:14px 22px 0;
  }

  /* QR / shelf-tag section */
  .qr-section{
    max-width:900px;
    margin:50px auto 0;
  }
  .qr-section h2{
    font-family:var(--font-script);
    color:var(--red);
    font-size:28px;
    margin-bottom:4px;
  }
  .qr-section p.hint{ opacity:0.7; font-size:13.5px; margin-top:0; }
  .qr-card{
    background:var(--cream);
    border:2px solid var(--ink);
    border-radius:16px;
    padding:20px;
    display:flex;
    gap:20px;
    align-items:center;
    flex-wrap:wrap;
  }
  .qr-card .qr-controls{ flex:1; min-width:220px; }
  .qr-card input[type=text]{
    width:100%;
    font-family:var(--font-body);
    font-size:13px;
    padding:9px 10px;
    border:1.5px solid var(--ink);
    border-radius:8px;
    background:#fff;
    margin-bottom:10px;
  }
  .qr-card .qr-buttons{ display:flex; gap:8px; flex-wrap:wrap; }
  .qr-card button{
    font-weight:700;
    font-size:12px;
    text-transform:uppercase;
    background:var(--ink);
    color:var(--cream);
    border:none;
    border-radius:8px;
    padding:9px 14px;
    cursor:pointer;
  }
  .qr-tag{
    background:#fff;
    border:2px solid var(--ink);
    border-radius:10px;
    padding:14px;
    text-align:center;
    width:170px;
    flex-shrink:0;
  }
  .qr-tag img{ width:140px; height:140px; display:block; margin:0 auto; }
  .qr-tag .tag-label{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    margin-top:8px;
  }
</style>
</head>
<body>

<div class="stripe-edge top"></div>
<div class="stripe-edge bottom"></div>
<div class="stripe-edge left"></div>
<div class="stripe-edge right"></div>

<div class="page">
  <header class="shop-header">
    <img class="logo" id="logoImg" alt="Sure's Essentials logo">
    <h1>Products</h1>
  </header>

  <div class="tier-toggle" id="tierToggle">
    <button class="retail" data-tier="retail">Retail</button>
    <button class="wholesale" data-tier="wholesale">Wholesale</button>
  </div>

  <div class="cat-grid" id="catGrid"></div>

  <p class="note" id="noteText"></p>
</div>

<button class="cart-fab" id="cartFab" aria-label="Open order ticket">
  Ticket <span class="count" id="cartCount">0</span>
</button>

<div class="overlay" id="overlay"></div>
<aside class="ticket" id="ticket">
  <div class="ticket-top">
    <div>
      <h2>Order ticket</h2>
      <div class="order-code" id="orderCode"></div>
    </div>
    <button class="close" id="closeTicket" aria-label="Close">&times;</button>
  </div>
  <div class="ticket-body" id="ticketBody"></div>
</aside>

<section class="qr-section" id="qrSection" style="display:none;">
  <h2>Shelf tag</h2>
  <p class="hint">Enter the web address where this page will live, then print the tag for your counter, window, or shelf.</p>
  <div class="qr-card">
    <div class="qr-controls">
      <input type="text" id="qrUrl" placeholder="https://your-shop-order-page.com">
      <div class="qr-buttons">
        <button id="genQr">Generate QR</button>
        <button id="printQr">Print tag</button>
      </div>
    </div>
    <div class="qr-tag" id="qrTag">
      <img id="qrImg" src="" alt="QR code" style="display:none;">
      <div class="tag-label" id="qrTagLabel">Scan to order</div>
    </div>
  </div>
</section>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const money = n => CONFIG.CURRENCY + n.toFixed(0);
  const ICONS = {
    droplet: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2s7 8 7 13a7 7 0 0 1-14 0c0-5 7-13 7-13z"/></svg>',
    basket: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h18l-1.5 10a2 2 0 0 1-2 2H6.5a2 2 0 0 1-2-2L3 9z"/><path d="M8 9V6a4 4 0 0 1 8 0v3"/></svg>',
    bottle: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3h6v3.5l1.5 2V19a2 2 0 0 1-2 2h-5a2 2 0 0 1-2-2V8.5L9 6.5V3z"/><path d="M9 3h6"/></svg>',
  };

  document.getElementById('logoImg').src = LOGO_DATA_URI;
  document.title = CONFIG.SHOP_NAME + " — Order";
  $('#noteText').textContent = "Note: " + NOTE;

  let tier = "retail";
  const activeVariant = {}; // catId -> variant name
  CATEGORIES.forEach(c => activeVariant[c.id] = c.variants[0]);
  const cart = []; // {key, catLabel, variant, size, tier, qty, unitPrice}

  function renderTierToggle(){
    $('#tierToggle').querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.tier === tier);
    });
  }
  $('#tierToggle').querySelectorAll('button').forEach(b => {
    b.onclick = () => { tier = b.dataset.tier; renderTierToggle(); renderCatalog(); };
  });

  function cartKey(catId, variant, size){ return catId + "|" + variant + "|" + size; }
  function qtyFor(catId, variant, size){
    const item = cart.find(i => i.key === cartKey(catId, variant, size) && i.tier === tier);
    return item ? item.qty : 0;
  }

  function changeQty(cat, variant, size, delta){
    const key = cartKey(cat.id, variant, size);
    let item = cart.find(i => i.key === key && i.tier === tier);
    if (!item){
      item = { key, catLabel: cat.label, variant, size, tier, qty: 0, unitPrice: PRICES[tier][size] };
      cart.push(item);
    }
    item.qty += delta;
    if (item.qty <= 0){
      const idx = cart.indexOf(item);
      cart.splice(idx, 1);
    }
    renderCatalog();
    renderCart();
    pulseCartFab();
  }

  function renderCatalog(){
    $('#catGrid').innerHTML = CATEGORIES.map(cat => {
      const chips = cat.variants.map(v =>
        `<button class="${v === activeVariant[cat.id] ? 'active' : ''}" data-cat="${cat.id}" data-variant="${v}">${v}</button>`
      ).join('');

      const rows = cat.sizes.map(size => {
        const q = qtyFor(cat.id, activeVariant[cat.id], size);
        const price = PRICES[tier][size];
        return `<div class="size-row ${tier === 'wholesale' ? 'wholesale-active' : ''}">
          <span class="size-label">${size} mL</span>
          <div class="right">
            <span class="price">${money(price)}</span>
            ${q === 0
              ? `<button class="add-btn" data-cat="${cat.id}" data-size="${size}">Add</button>`
              : `<div class="stepper">
                   <button data-cat="${cat.id}" data-size="${size}" data-d="-1">−</button>
                   <span>${q}</span>
                   <button data-cat="${cat.id}" data-size="${size}" data-d="1">+</button>
                 </div>`}
          </div>
        </div>`;
      }).join('');

      return `<div class="cat-card">
        <div class="cat-title">
          <span class="icon">${ICONS[cat.icon] || ''}</span>
          <h2>${cat.label}</h2>
        </div>
        <div class="variant-chips">${chips}</div>
        <div class="size-rows">${rows}</div>
      </div>`;
    }).join('');

    $('#catGrid').querySelectorAll('.variant-chips button').forEach(b => {
      b.onclick = () => { activeVariant[b.dataset.cat] = b.dataset.variant; renderCatalog(); };
    });
    $('#catGrid').querySelectorAll('.add-btn').forEach(b => {
      const cat = CATEGORIES.find(c => c.id === b.dataset.cat);
      b.onclick = () => changeQty(cat, activeVariant[cat.id], parseInt(b.dataset.size), 1);
    });
    $('#catGrid').querySelectorAll('.stepper button').forEach(b => {
      const cat = CATEGORIES.find(c => c.id === b.dataset.cat);
      b.onclick = () => changeQty(cat, activeVariant[cat.id], parseInt(b.dataset.size), parseInt(b.dataset.d));
    });
  }

  function pulseCartFab(){
    const fab = $('#cartFab');
    fab.style.transform = 'scale(1.06)';
    setTimeout(() => fab.style.transform = '', 140);
  }

  function cartTotal(){ return cart.reduce((s, i) => s + i.unitPrice * i.qty, 0); }
  function cartCount(){ return cart.reduce((s, i) => s + i.qty, 0); }

  let orderCode = null;
  function newOrderCode(){
    const d = new Date();
    orderCode = "SE-" + d.getFullYear().toString().slice(2) +
      String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') +
      "-" + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0');
    return orderCode;
  }

  function renderCart(){
    $('#cartCount').textContent = cartCount();
    $('#orderCode').textContent = orderCode ? "#" + orderCode : "";
    const body = $('#ticketBody');

    if (cartCount() === 0){
      body.innerHTML = `<div class="ticket-empty">Your ticket is empty.<br>Add something from the catalog.</div>`;
      return;
    }

    const lines = cart.map(i => `<div class="line-item">
      <span class="name">${i.variant} <span class="sub">(${i.catLabel}, ${i.size}mL, ${i.tier})</span> × ${i.qty}</span>
      <span class="line-price">${money(i.unitPrice * i.qty)}</span>
      <button class="remove" data-key="${i.key}" data-tier="${i.tier}">Remove</button>
    </div>`).join('');

    const total = cartTotal();

    body.innerHTML = `
      ${lines}
      <div class="totals">
        <div class="row"><span>Items</span><span>${cartCount()}</span></div>
        <div class="grand"><span>Total</span><span class="amount">${money(total)}</span></div>
      </div>
      <form class="checkout" id="checkoutForm">
        <div>
          <label for="custName">Name</label>
          <input type="text" id="custName" required>
        </div>
        <div>
          <label for="custPhone">Phone</label>
          <input type="tel" id="custPhone" required>
        </div>
        <div>
          <label>Fulfillment</label>
          <div class="radio-row">
            <label><input type="radio" name="fulfillment" value="Pickup" checked> Pickup</label>
            <label><input type="radio" name="fulfillment" value="Delivery"> Delivery</label>
          </div>
        </div>
        <div id="addressWrap" style="display:none;">
          <label for="custAddress">Delivery address</label>
          <input type="text" id="custAddress">
        </div>
        <div>
          <label for="custNotes">Notes (optional)</label>
          <textarea id="custNotes" placeholder="Preferred pickup time, container return, etc."></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Send order</button>
      </form>
      ${CONFIG.SHEET_WEBHOOK_URL ? '' : `<div class="setup-note">Shop owner setup: this page isn't connected to a spreadsheet yet. Set <code>CONFIG.SHEET_WEBHOOK_URL</code> in the page code to your Google Apps Script Web App URL. Orders will show a preview here until then.</div>`}
    `;

    body.querySelectorAll('.remove').forEach(b => b.onclick = () => {
      const idx = cart.findIndex(i => i.key === b.dataset.key && i.tier === b.dataset.tier);
      if (idx > -1) cart.splice(idx, 1);
      renderCatalog(); renderCart();
    });

    const addressWrap = $('#addressWrap');
    body.querySelectorAll('input[name=fulfillment]').forEach(r => r.onchange = syncAddress);
    function syncAddress(){
      const val = body.querySelector('input[name=fulfillment]:checked').value;
      addressWrap.style.display = val === 'Delivery' ? 'block' : 'none';
    }
    syncAddress();

    $('#checkoutForm').onsubmit = submitOrder;
  }

  async function submitOrder(e){
    e.preventDefault();
    const btn = $('#submitBtn');
    btn.disabled = true;
    btn.textContent = "Sending…";

    if (!orderCode) newOrderCode();

    const order = {
      orderCode,
      timestamp: new Date().toISOString(),
      name: $('#custName').value,
      phone: $('#custPhone').value,
      fulfillment: document.querySelector('input[name=fulfillment]:checked').value,
      address: $('#custAddress') ? $('#custAddress').value : "",
      notes: $('#custNotes').value,
      items: cart.map(i => ({
        category: i.catLabel, variant: i.variant, size: i.size, tier: i.tier,
        qty: i.qty, unitPrice: i.unitPrice, lineTotal: +(i.unitPrice * i.qty).toFixed(0),
      })),
      total: +cartTotal().toFixed(0),
    };

    let sent = false;
    if (CONFIG.SHEET_WEBHOOK_URL){
      try {
        await fetch(CONFIG.SHEET_WEBHOOK_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(order),
        });
        sent = true;
      } catch (err){ sent = false; }
    }

    showConfirmation(order, sent);
  }

  function showConfirmation(order, sent){
    const body = $('#ticketBody');
    body.innerHTML = `
      <div class="confirm">
        <div class="big-stamp">${sent ? "Order sent" : "Order captured"}</div>
        <p class="code">Ticket #${order.orderCode}</p>
        <p>${sent
          ? "Your order was sent to the shop. They'll confirm shortly."
          : "This page isn't connected to the shop's system yet, so nothing was sent — this is a preview of what the order would contain."}</p>
        <div class="totals" style="text-align:left; margin-top:18px;">
          ${order.items.map(i => `<div class="row"><span>${i.variant} × ${i.qty}</span><span>${money(i.lineTotal)}</span></div>`).join('')}
          <div class="grand"><span>Total</span><span class="amount">${money(order.total)}</span></div>
        </div>
        <button class="add-btn" id="newOrderBtn" style="margin-top:20px; padding:10px 16px;">Start new order</button>
      </div>
    `;
    $('#newOrderBtn').onclick = () => {
      cart.length = 0;
      orderCode = null;
      renderCatalog(); renderCart();
    };
  }

  function openTicket(){
    $('#overlay').classList.add('open');
    $('#ticket').classList.add('open');
    if (!orderCode && cartCount() > 0) newOrderCode();
    renderCart();
  }
  function closeTicket(){
    $('#overlay').classList.remove('open');
    $('#ticket').classList.remove('open');
  }
  $('#cartFab').onclick = openTicket;
  $('#closeTicket').onclick = closeTicket;
  $('#overlay').onclick = closeTicket;

  function buildQrUrl(target){
    return "https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=8&data=" + encodeURIComponent(target);
  }
  $('#genQr').onclick = () => {
    const url = $('#qrUrl').value.trim();
    if (!url) return;
    $('#qrImg').src = buildQrUrl(url);
    $('#qrImg').style.display = 'block';
    $('#qrTagLabel').textContent = CONFIG.SHOP_NAME + " — scan to order";
  };
  $('#printQr').onclick = () => {
    if (!$('#qrImg').src) { $('#genQr').click(); }
    const w = window.open('', '_blank');
    w.document.write(`<html><head><title>Print tag</title></head><body style="font-family:sans-serif;text-align:center;padding:40px;">
      <div style="display:inline-block;border:2px solid #211E1B;padding:24px;">
        <img src="${$('#qrImg').src}" style="width:220px;height:220px;">
        <p style="font-size:14px;margin-top:10px;">${CONFIG.SHOP_NAME} — scan to order</p>
      </div>
      <script>window.onload=()=>window.print()<\/script>
    </body></html>`);
    w.document.close();
  };

  // Shelf-tag / QR tool is for the shop owner only — hidden from customers
  // by default. Add ?admin=1 to the page URL to reveal it, e.g.:
  // https://yoursite.com/index.html?admin=1
  const params = new URLSearchParams(window.location.search);
  if (params.get('admin') === '1'){
    document.getElementById('qrSection').style.display = '';
  }

  renderTierToggle();
  renderCatalog();
  renderCart();
})();
</script>

</body>
</html>
